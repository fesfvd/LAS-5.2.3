<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正在分析 — LAS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{ink:'#1a1a1a',paper:'#faf8f3',gold:'#b8860b',crimson:'#8b0000',muted:'#8a8578'},fontFamily:{serif:['Noto Serif SC','Georgia','serif'],sans:['Noto Sans SC','Helvetica','sans-serif'],mono:['JetBrains Mono','monospace']}}}}</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a1a;
  --paper: #faf8f3;
  --gold: #b8860b;
  --muted: #8a8578;
  --rule: rgba(26,26,26,.08);
  --rule-strong: rgba(26,26,26,.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { 
  height: 100%; 
  overflow: hidden; 
  background-color: var(--paper); /* 确保背景是纸张色 */
}
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

/* 导航 */
.nav-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px; border-bottom: 1px solid var(--rule);
  background: rgba(250,248,243,.92); backdrop-filter: blur(12px);
  z-index: 50; flex-shrink: 0;
}
.nav-brand {
  font-weight: 700; font-size: 1.1rem; color: var(--gold);
  text-decoration: none; font-family: 'Noto Serif SC', serif;
}

/* 主容器 */
.main-container {
  flex: 1; display: flex; flex-direction: column;
  max-width: 720px; width: 100%; margin: 0 auto;
  padding: 32px 24px 24px; overflow: hidden;
}

/* 头部与进度环 */
.header-section {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 24px; flex-shrink: 0;
}
.progress-ring-container { width: 56px; height: 56px; position: relative; flex-shrink: 0; }
.progress-ring svg { transform: rotate(-90deg); }
.ring-bg { stroke: var(--rule); fill: transparent; }
.ring-fill { stroke: var(--gold); fill: transparent; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }
.progress-percent {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--ink);
}

/* 终端窗口 */
.terminal-window {
  flex: 1; 
  background: rgba(26,26,26,.02); /* 极浅的灰底，绝不是黑色 */
  border: 1px solid var(--rule); 
  padding: 20px; overflow-y: auto; 
  font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.7; color: var(--ink);
}
.terminal-window::-webkit-scrollbar { width: 4px; }
.terminal-window::-webkit-scrollbar-track { background: transparent; }
.terminal-window::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

/* 日志行动画 */
.log-line {
  margin-bottom: 6px; opacity: 0; transform: translateY(4px);
  transition: all 0.3s cubic-bezier(.4,0,.2,1);
}
.log-line.show { opacity: 1; transform: translateY(0); }
.log-step { color: var(--muted); margin-right: 8px; }

/* 微型进度条 */
.log-progress { display: inline-block; margin-left: 8px; }
.progress-bar {
  display: inline-block; width: 80px; height: 6px; border: 1px solid var(--rule-strong);
  vertical-align: middle; position: relative; overflow: hidden;
}
.progress-fill {
  position: absolute; top: 0; left: 0; height: 100%;
  background: var(--muted); width: 0%; transition: width 0.3s linear;
}
.progress-text { margin-left: 4px; font-size: 11px; color: var(--muted); }

/* 底部状态栏 */
.status-bar {
  flex-shrink: 0; padding-top: 16px; display: flex; justify-content: space-between;
  align-items: center; border-top: 1px solid var(--rule); margin-top: 16px;
}

/* 闪烁光标 */
@keyframes blink { 0%, 100% { opacity: 1 } 50% { opacity: 0 } }
.cursor-blink {
  display: inline-block; width: 8px; height: 14px; background: var(--gold);
  vertical-align: middle; animation: blink 1s step-end infinite; margin-left: 2px;
}
</style>
</head>
<body>

<nav class="nav-top">
  <a class="nav-brand" href="/">LAS</a>
  <span class="mono text-xs text-muted">v5.2.3</span>
</nav>

<div class="main-container">
  
  <div class="header-section">
    <div>
      <p class="mono text-xs text-muted tracking-[4px] mb-1">WORKFLOW 分析推演</p>
      <h1 class="serif text-3xl font-black leading-[1.1]">正在分析</h1>
    </div>
    <!-- 全局圆环进度 -->
    <div class="progress-ring-container">
      <svg width="56" height="56" viewBox="0 0 56 56">
        <circle class="ring-bg" cx="28" cy="28" r="24" stroke-width="2" />
        <circle class="ring-fill" id="progressCircle" cx="28" cy="28" r="24" stroke-width="2" 
                stroke-dasharray="150.796" stroke-dashoffset="150.796" />
      </svg>
      <span class="progress-percent" id="progressText">0%</span>
    </div>
  </div>

  <div class="terminal-window" id="logBox">
    <div id="dynamicContent"></div>
    <span class="cursor-blink" id="cursor" style="display:none"></span>
  </div>

  <div class="status-bar">
    <p class="mono text-xs text-muted" id="statusText">准备启动...</p>
    <p class="mono text-xs" id="statusIndicator" style="color:var(--gold);display:none">● 分析完成</p>
  </div>
</div>

<script>
const logBox = document.getElementById('logBox');
const dynamicContent = document.getElementById('dynamicContent');
const cursor = document.getElementById('cursor');
const statusText = document.getElementById('statusText');
const statusIndicator = document.getElementById('statusIndicator');
const progressCircle = document.getElementById('progressCircle');
const progressText = document.getElementById('progressText');

const totalSteps = 10; 
let currentStep = 0;

// 更新右上角圆环进度
function updateGlobalProgress() {
  currentStep++;
  const percent = Math.min(100, Math.round(currentStep / totalSteps * 100));
  const offset = 150.796 - (150.796 * percent / 100);
  progressCircle.style.strokeDashoffset = offset;
  progressText.textContent = percent + '%';
}

// 纯净工作流序列
const workflow = [
  { type: 'text', step: '01', text: '接收文本，清洗格式噪声...' },
  { type: 'text', step: '02', text: '识别体裁，匹配权重策略...' },
  { type: 'text', step: '03', text: '加载十五级评分标尺坐标系...' },
  { type: 'progress', step: '04', text: '解析 A层 · 语言与形式', duration: 1200 },
  { type: 'progress', step: '05', text: '解析 B层 · 叙事与内容', duration: 1400 },
  { type: 'progress', step: '06', text: '解析 C层 · 思想与意义', duration: 1100 },
  { type: 'progress', step: '07', text: '解析 D层 · 审美与影响', duration: 900 },
  { type: 'text', step: '08', text: '十六维标尺逐项比对基准序列...' },
  { type: 'text', step: '09', text: '校验维度均衡性...' },
  { type: 'text', step: '10', text: '核算最终权重，生成评估报告' }
];

// 打字机效果
function typeText(element, text, speed = 20) {
  return new Promise(resolve => {
    let i = 0;
    cursor.style.display = 'inline-block';
    element.appendChild(cursor);
    const interval = setInterval(() => {
      if (i < text.length) {
        element.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
        logBox.scrollTop = logBox.scrollHeight;
      } else {
        clearInterval(interval);
        resolve();
      }
    }, speed);
  });
}

// 微型进度条动画
function runProgress(fillEl, textEl, duration) {
  return new Promise(resolve => {
    let p = 0;
    const step = 100 / (duration / 50);
    const interval = setInterval(() => {
      p += step;
      if (p >= 100) {
        p = 100;
        clearInterval(interval);
        fillEl.style.background = 'var(--gold)';
        fillEl.style.width = '100%';
        textEl.textContent = 'DONE';
        resolve();
      } else {
        fillEl.style.width = p + '%';
        textEl.textContent = Math.floor(p) + '%';
      }
      logBox.scrollTop = logBox.scrollHeight;
    }, 50);
  });
}

// 执行单步推演
async function executeStep(config) {
  const lineDiv = document.createElement('div');
  lineDiv.className = 'log-line';
  dynamicContent.appendChild(lineDiv);
  
  // 触发淡入动画
  requestAnimationFrame(() => {
    lineDiv.classList.add('show');
  });

  if (config.type === 'text') {
    const stepSpan = document.createElement('span');
    stepSpan.className = 'log-step';
    stepSpan.textContent = config.step;
    lineDiv.appendChild(stepSpan);
    await typeText(lineDiv, config.text, 20);
  } else if (config.type === 'progress') {
    const stepSpan = document.createElement('span');
    stepSpan.className = 'log-step';
    stepSpan.textContent = config.step;
    lineDiv.appendChild(stepSpan);

    const textSpan = document.createElement('span');
    textSpan.textContent = config.text + ' ';
    lineDiv.appendChild(textSpan);

    const progressContainer = document.createElement('span');
    progressContainer.className = 'log-progress';
    progressContainer.innerHTML = `
      <span class="progress-bar"><span class="progress-fill"></span></span>
      <span class="progress-text">0%</span>
    `;
    lineDiv.appendChild(progressContainer);
    
    cursor.style.display = 'none'; // 进度条运行时隐藏打字光标
    const fillEl = progressContainer.querySelector('.progress-fill');
    const textEl = progressContainer.querySelector('.progress-text');
    await runProgress(fillEl, textEl, config.duration);
  }

  updateGlobalProgress(); // 更新右上角圆环
  await new Promise(r => setTimeout(r, 300)); // 步骤间短暂停顿
}

// 主流程控制
async function startAnalysis() {
  statusText.textContent = '序列启动中...';
  await new Promise(r => setTimeout(r, 800));
  statusText.textContent = 'EXECUTING...';
  
  for (let i = 0; i < workflow.length; i++) {
    await executeStep(workflow[i]);
  }

  cursor.style.display = 'none';
  statusText.textContent = '';
  statusIndicator.style.display = 'block';
  
  await new Promise(r => setTimeout(r, 2000));
  alert('演示结束：将展示报告。');
}

// 启动
startAnalysis();
</script>
</body>
</html>
