<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正在分析 — LAS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{ink:'#1a1a1a',paper:'#faf8f3',gold:'#b8860b',crimson:'#8b0000',jade:'#2d6a4f',muted:'#8a8578'},fontFamily:{serif:['Noto Serif SC','Georgia','serif'],sans:['Noto Sans SC','Helvetica','sans-serif'],mono:['JetBrains Mono','monospace']}}}}</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--ink:#1a1a1a;--paper:#faf8f3;--gold:#b8860b;--crimson:#8b0000;--jade:#2d6a4f;--muted:#8a8578;--rule:rgba(26,26,26,.08)}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC',sans-serif;background:var(--paper);color:var(--ink);font-size:16px;line-height:1.8;-webkit-font-smoothing:antialiased}
.serif{font-family:'Noto Serif SC',Georgia,serif;letter-spacing:.03em}
.mono{font-family:'JetBrains Mono',monospace;letter-spacing:0}

/* nav */
.nav-top{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--rule);position:sticky;top:0;background:rgba(250,248,243,.92);backdrop-filter:blur(12px);z-index:50}
.nav-brand{font-weight:700;font-size:1.1rem;color:var(--gold);text-decoration:none;font-family:'Noto Serif SC',Georgia,serif}

/* card */
.card{border:1px solid var(--rule);padding:32px 28px 24px;background:rgba(255,255,255,.5);transition:border-color .3s,box-shadow .3s}
.card:hover{border-color:var(--gold);box-shadow:0 2px 24px rgba(0,0,0,.03)}

/* progress bar */
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .6s cubic-bezier(.4,0,.2,1) both}
.d1{animation-delay:.1s}

.progress-track{position:relative;height:4px;background:rgba(0,0,0,.04);border-radius:99px;overflow:hidden}
.progress-indeterminate{position:absolute;left:0;top:0;height:100%;width:40%;background:linear-gradient(90deg,transparent,var(--gold),var(--crimson),var(--gold),transparent);border-radius:99px;animation:shimmer 2s ease-in-out infinite}
.progress-indeterminate.progress-done{width:100%;animation:none;background:linear-gradient(90deg,var(--gold),var(--crimson));transition:width .6s cubic-bezier(.4,0,.2,1)}
.progress-track.progress-done{background:rgba(0,0,0,.02)}

/* error */
.btn{padding:10px 28px;border:1px solid var(--gold);color:var(--gold);font-size:.85rem;letter-spacing:2px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);background:transparent;font-family:inherit}
.btn:hover{background:var(--gold);color:var(--paper);transform:translateY(-1px)}
.btn-primary{background:var(--gold);color:var(--paper);font-weight:500}
.btn-primary:hover{background:transparent;color:var(--gold)}
</style>
</head>
<body>

<nav class="nav-top">
  <a class="nav-brand" href="/">LAS</a>
  <span class="mono text-xs text-muted">v5.2.3</span>
</nav>

<main class="max-w-2xl mx-auto px-6" style="padding-top:80px;padding-bottom:80px">
  <section class="fade-up d1 text-center">

    <p class="mono text-xs text-muted tracking-[4px] mb-2 uppercase">Analysis in Progress</p>
    <h1 class="serif text-3xl md:text-4xl font-black mb-8">正在分析</h1>

    <div class="card" style="max-width:480px;margin:0 auto">
      <!-- 进度条 -->
      <div class="progress-track" id="progressTrack">
        <div class="progress-indeterminate" id="analyzeProgress"></div>
      </div>

      <!-- 阶段信息 -->
      <div class="mb-2 mt-5" style="text-align:left">
        <p class="text-sm font-semibold serif mb-1" id="phaseLabel" style="transition:color .4s">接收作品文本</p>
        <p class="text-xs" style="color:var(--muted);line-height:1.6" id="phaseDesc">正在读取并预处理作品内容</p>
      </div>

      <!-- 阶段清单 -->
      <div class="mt-4 pt-3" style="border-top:1px solid var(--rule);text-align:left" id="checklist"></div>
    </div>

    <!-- 高级模块提示 -->
    <p class="text-xs text-muted mt-3" id="moduleHint" style="display:none">
      <i class="fas fa-scroll mr-1"></i>已启用「先贤灵境」
    </p>

    <!-- 控制按钮（演示用） -->
    <div class="flex items-center justify-center gap-3 mt-6" style="flex-wrap:wrap">
      <button class="btn" onclick="simulateAnalysis()" style="font-size:13px;padding:6px 16px">
        <i class="fas fa-play mr-1"></i>模拟分析过程
      </button>
      <button class="btn" onclick="showDone()" style="font-size:13px;padding:6px 16px">
        <i class="fas fa-flag-checkered mr-1"></i>跳到完成
      </button>
      <button class="btn" onclick="showError()" style="font-size:13px;padding:6px 16px;border-color:var(--crimson);color:var(--crimson)">
        <i class="fas fa-bolt mr-1"></i>模拟错误
      </button>
    </div>
  </section>
</main>

<script>
const PHASES = [
  { minChars: 0,    label: '接收作品文本', desc: '正在读取并预处理作品内容' },
  { minChars: 600,  label: '体裁识别与基准匹配', desc: '识别文学体裁、匹配分析策略、选定比较基准' },
  { minChars: 3500, label: '十六维逐项评分', desc: '对语言、叙事、思想、审美四个层面逐维度分析打分' },
  { minChars: 11000,label: '生成分析报告', desc: '整合评分结果，撰写文学定位、张力分析、编辑建议等深度内容' },
  { minChars: 16000,label: '最终校验与输出', desc: '执行自检清单，确保报告完整性与一致性' },
];

let _maxPhaseReached = -1;
let _charTotal = 0;
let _simInterval = null;

function updateProgress(chars, forceDone) {
  const barEl = document.getElementById('analyzeProgress');
  const trackEl = document.getElementById('progressTrack');
  const phaseLabelEl = document.getElementById('phaseLabel');
  const phaseDescEl = document.getElementById('phaseDesc');
  const checklistEl = document.getElementById('checklist');

  if (forceDone) {
    if (trackEl) trackEl.classList.add('progress-done');
    if (barEl) barEl.classList.add('progress-done');
    if (phaseLabelEl) phaseLabelEl.textContent = '分析完成';
    if (phaseDescEl) phaseDescEl.textContent = '正在加载报告...';
    if (checklistEl) {
      checklistEl.innerHTML = PHASES.map(p =>
        `<div class="flex items-center gap-2 mb-1.5" style="font-size:12px;color:var(--jade)"><i class="fas fa-check-circle" style="color:var(--jade);font-size:12px"></i><span>${p.label}</span></div>`
      ).join('');
    }
    return;
  }

  let currentPhase = 0;
  PHASES.forEach((p, i) => { if (chars >= p.minChars) currentPhase = i; });
  if (currentPhase < _maxPhaseReached) currentPhase = _maxPhaseReached;
  _maxPhaseReached = currentPhase;

  const phase = PHASES[currentPhase];
  if (phaseLabelEl) phaseLabelEl.textContent = phase.label;
  if (phaseDescEl) phaseDescEl.textContent = phase.desc;

  if (checklistEl) {
    checklistEl.innerHTML = PHASES.map((p, i) => {
      const done = i < currentPhase;
      const active = i === currentPhase;
      const icon = done
        ? '<i class="fas fa-check-circle" style="color:var(--jade);font-size:12px"></i>'
        : active
        ? '<i class="fas fa-circle" style="color:var(--gold);font-size:6px;animation:pulse 1.2s ease-in-out infinite"></i>'
        : '<i class="far fa-circle" style="color:rgba(0,0,0,.12);font-size:11px"></i>';
      const cls = done ? '' : active ? '' : 'text-muted/40';
      return `<div class="flex items-center gap-2 mb-1.5 ${cls}" style="font-size:12px">${icon}<span>${p.label}</span></div>`;
    }).join('');
  }
}

function resetState() {
  if (_simInterval) clearInterval(_simInterval);
  _maxPhaseReached = -1;
  _charTotal = 0;
  const barEl = document.getElementById('analyzeProgress');
  const trackEl = document.getElementById('progressTrack');
  if (trackEl) trackEl.classList.remove('progress-done');
  if (barEl) barEl.classList.remove('progress-done');
  const checklistEl = document.getElementById('checklist');
  if (checklistEl) checklistEl.innerHTML = '';
  updateProgress(0, false);
}

function simulateAnalysis() {
  resetState();
  _simInterval = setInterval(() => {
    _charTotal += 300 + Math.floor(Math.random() * 500);
    updateProgress(_charTotal, false);
    if (_charTotal >= 18000) {
      clearInterval(_simInterval);
      setTimeout(() => updateProgress(0, true), 400);
    }
  }, 350);
}

function showDone() {
  resetState();
  updateProgress(0, true);
}

function showError() {
  resetState();
  const card = document.querySelector('.card');
  if (card) {
    card.innerHTML = `
      <div class="text-center py-4">
        <i class="fas fa-exclamation-circle mb-3" style="font-size:28px;color:var(--crimson)"></i>
        <p class="text-sm font-semibold mb-1" style="color:var(--crimson)">连接中断</p>
        <p class="text-xs" style="color:var(--muted)">无法连接到分析服务，请检查网络后重试。</p>
        <button class="btn btn-primary mt-3" onclick="location.reload()" style="font-size:13px">重试</button>
      </div>`;
  }
}

// 初始渲染
updateProgress(0, false);
</script>
</body>
</html>
