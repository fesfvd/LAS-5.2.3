# Production overrides for docker-compose.yml
# 用法: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  las:
    restart: always
    # 资源限制（根据服务器配置调整）
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
        reservations:
          memory: 512m
          cpus: "0.5"
    # 生产日志驱动
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # 环境
    environment:
      - LAS_DEV=false
