name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r backend/requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Test (pytest)
        run: python -m pytest backend/tests/ -v
        env:
          LAS_DEV: "true"
