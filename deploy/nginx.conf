# LAS v5.2.3 — Nginx 反向代理配置
# 路径: /etc/nginx/sites-available/las
# 部署: ln -s /etc/nginx/sites-available/las /etc/nginx/sites-enabled/las

# ── 速率限制定义 ──
limit_req_zone $binary_remote_addr zone=las_analyze:10m rate=6r/m;
limit_req_zone $binary_remote_addr zone=las_login:10m rate=20r/m;
limit_conn_zone $binary_remote_addr zone=las_conn:10m;

# ── HTTP → HTTPS 重定向（获取 SSL 证书后取消注释） ──
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    # 备案期间先用 80 端口
    listen 80;
    # 获取 SSL 证书后改为:
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;

    server_name your-domain.com;

    # 安全头（兜底）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 上传大小限制（作品正文）
    client_max_body_size 10m;

    # ── 静态文件（长缓存，版本号破坏缓存） ──
    location /css/ {
        alias /opt/las/frontend/css/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location /js/ {
        alias /opt/las/frontend/js/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location /templates/ {
        alias /opt/las/frontend/templates/;
        expires 7d;
    }
    location /static/ {
        alias /opt/las/frontend/;
        expires 7d;
    }

    # ── API 代理 ──
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式传输超时（分析可能持续 5-10 分钟）
        proxy_read_timeout 600s;
        proxy_buffering off;  # 关键: 禁用缓冲以支持 SSE

        # API 速率限制
        location /api/works/*/analyze {
            limit_req zone=las_analyze burst=2 nodelay;
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }
    }

    location /api/auth/login {
        limit_req zone=las_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA 入口（禁用缓存） ──
    location /app {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── 健康检查 ──
    location /api/health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── 首页 + 兜底 ──
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_conn las_conn 20;
    }
}
